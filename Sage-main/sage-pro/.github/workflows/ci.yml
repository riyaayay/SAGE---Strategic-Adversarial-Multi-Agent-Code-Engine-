name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy pytest pytest-asyncio pytest-cov hypothesis structlog pydantic datasets
        
    - name: Lint with Ruff
      run: ruff check .
      
    - name: Type check with Mypy
      run: mypy --strict .
      
    - name: Test with Pytest
      run: pytest --cov=sage --cov-fail-under=85

name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest numpy gudhi faiss-cpu loguru pydantic langgraph
    - name: Lint with ruff
      run: ruff check .
    - name: Run AODE operator tests
      run: pytest sage/tests/test_aode_operators.py sage/tests/test_lie_bracket_nonzero.py
